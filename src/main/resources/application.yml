spring:
  application:
    name: IEUM

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  issuer: ieum-api
  secret: ${JWT_SECRET}
  access-token-ttl: 30m
  refresh-token-ttl: 14d

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      base-path: /actuator

logging:
  level:
    root: info
